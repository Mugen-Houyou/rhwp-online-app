<!DOCTYPE html>
<html>
<body style="margin:0;background:#fff;font-family:'Malgun Gothic',sans-serif;user-select:none;display:flex;align-items:center;justify-content:center;height:100vh">
  <div style="display:flex;align-items:center;gap:20px">
    <img src="__APP_ICON_URI__" width="40" height="40" style="flex-shrink:0;border-radius:8px" />
    <div>
      <p style="margin:0 0 8px;font-size:14px;color:#333;font-weight:600">
        RHWP 업데이트를 설치하고 있습니다…</p>
      <p style="margin:0 0 12px;font-size:12px;color:#888">잠시만 기다려주세요.</p>
      <div style="height:4px;border-radius:2px;background:#e0e0e0;overflow:hidden">
        <div style="height:100%;border-radius:2px;background:#4a90d9;
          animation:progress 1s cubic-bezier(.4,0,.6,1) infinite alternate;width:30%"></div>
      </div>
    </div>
  </div>
  <style>@keyframes progress{0%{transform:translateX(0)}100%{transform:translateX(233%)}}</style>
</body>
</html>
